<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>
    <link rel="stylesheet" href="/static/style.css">

</head>
<body>
    <h1>Todo List</h1>

    <form action="/add" method="post">
        <input type="text" name="title" placeholder="输入任务"> 
        <button type="submit">添加</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li class="{% if todo.completed %} completed {% endif %}">
                [{{ '√' if todo.completed else ' '}}] {{ todo.todo_id }} : {{ todo.title }}
                {% if todo.completed %}
                    {% if todo.completed_at %}
                        ✅️ {{ todo.completed_at }}
                    {% endif %}
                {% endif %}

                {% if todo.completed %}
                    <a href="/complete/{{ todo.todo_id }}">
                        取消
                    </a>
                {% else %}
                    <a href="/complete/{{ todo.todo_id }}">
                        完成
                    </a>
                {% endif %}
                    
                <a href="/delete/{{ todo.todo_id }}">
                    删除
                </a>
                
                <a href="/edit/{{ todo.todo_id}}">
                    编辑
                </a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
