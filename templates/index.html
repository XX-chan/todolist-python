<!DOCTYPE html>
<html>
<head>
    <title>Todo List</title>

    <style>
        body {
            font-family: Arial;
        }

        li {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Todo List</h1>

    <form action="/add" method="post">
        <input type="text" name="title" placeholder="输入任务"> 
        <button type="submit">添加</button>
    </form>

    <ul>
        {% for todo in todos %}
            <li>{{ todo.title }}</li>
        {% endfor %}
    </ul>

</body>
</html>
