<!DOCTYPE html>
<html>
<head>
    <title>登录</title>
    <link rel="stylesheet" href="/static/login_style.css">
</head>

<body>
    <h1>登录页面</h1>

    <form action="/login" method="post">
        <p>
            用户名：
            <input type="text" name="username" placeholder="输入用户名" required>
        </p>

        <p>
            密码：
            <input type="text" name="password" placeholder="密码" required>
        </p>

        <p class="center">
            <button type="submit">登录</button>
        </p>

    </form>

    <p class="center">
        <a class="btn" href="/register">前往注册</a>
    </p>

</body>

</html>
